name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Use --include=optional to help npm find native bindings like @tailwindcss/oxide
          npm install --include=optional
          # Fallback for Tailwind CSS v4 native bindings if the above fails
          npm install @tailwindcss/oxide-linux-x64-gnu || true

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          # 1. REMOVE AND RE-ADD ANDROID FROM SCRATCH
          echo "Removing and re-adding Android platform..."
          rm -rf android
          npx cap add android
          
          # 2. PREPARE ASSETS FOR CAPACITOR-ASSETS TOOL
          # The tool works best when it finds specific names in the assets folder
          echo "Preparing assets..."
          mkdir -p assets
          cp assets/icon.png assets/icon-only.png
          cp assets/icon.png assets/icon-foreground.png
          cp assets/icon.png assets/icon-background.png
          if [ ! -f "assets/splash.png" ]; then cp assets/icon.png assets/splash.png; fi
          if [ ! -f "assets/splash-dark.png" ]; then cp assets/icon.png assets/splash-dark.png; fi

          # 3. GENERATE ALL ASSETS (ICONS & SPLASH)
          echo "Generating icons..."
          npx @capacitor/assets generate --android

          # 4. CRITICAL FIX: MANUALLY OVERWRITE DEFAULT BACKGROUND
          # Sometimes the default background color stays white, masking our icon.
          # We force the background to be a drawable if needed, or simply ensure our icons are everywhere.
          
          # 5. FIX GRADLE WRAPPER (Common Capacitor setup issue)
          GRADLE_VERSION=$(grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
          if [ -z "$GRADLE_VERSION" ]; then GRADLE_VERSION="8.2.1"; fi
          echo "Downloading official Gradle wrapper jar v$GRADLE_VERSION..."
          mkdir -p android/gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          
          # 6. SYNC AND PERMISSIONS
          chmod +x android/gradlew
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: decision-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
