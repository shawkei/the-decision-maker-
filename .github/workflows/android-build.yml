name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Use --include=optional to help npm find native bindings like @tailwindcss/oxide
          npm install --include=optional
          # Fallback for Tailwind CSS v4 native bindings if the above fails
          npm install @tailwindcss/oxide-linux-x64-gnu || true

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          # Ensure android directory exists
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Detect Gradle version from properties
          GRADLE_VERSION=$(grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
          if [ -z "$GRADLE_VERSION" ]; then GRADLE_VERSION="8.2.1"; fi
          echo "Detected Gradle Version: $GRADLE_VERSION"
          
          # CRITICAL: Fix for the missing/corrupted Gradle Wrapper JAR
          echo "Downloading official Gradle wrapper jar for v$GRADLE_VERSION..."
          mkdir -p android/gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          
          # Verify download (check if it's at least 50KB)
          JAR_SIZE=$(wc -c < "android/gradle/wrapper/gradle-wrapper.jar")
          if [ "$JAR_SIZE" -lt 50000 ]; then
            echo "Download failed or jar is too small ($JAR_SIZE bytes). Trying fallback..."
            curl -L "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          fi
          
          # Ensure permissions
          chmod +x android/gradlew
          
          # Generate icons if assets exist
          if [ -d "assets" ] && [ -f "assets/icon.png" ]; then
            echo "Preparing assets..."
            # Ensure splash exists to prevent tool failure
            if [ ! -f "assets/splash.png" ]; then cp assets/icon.png assets/splash.png; fi
            
            # Ensure web icons are updated in public folder
            mkdir -p public
            cp assets/icon.png public/icon.png
            
            echo "Generating icons and splash screens from assets..."
            # Using latest and being explicit
            npx @capacitor/assets generate --android
          fi
          
          # Sync Capacitor
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: decision-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
