name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Use --include=optional to help npm find native bindings like @tailwindcss/oxide
          npm install --include=optional
          # Fallback for Tailwind CSS v4 native bindings if the above fails
          npm install @tailwindcss/oxide-linux-x64-gnu || true

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          # 1. CLEAN REBUILD
          echo "Cleaning and re-adding Android platform..."
          rm -rf android
          npx cap add android
          
          # 2. ASSET GENERATION
          # We ensure the assets folder has the expected naming convention for @capacitor/assets
          echo "Generating icons and splash screens..."
          # The tool automatically looks for icon-only.png, icon-foreground.png, etc. in assets/
          npx @capacitor/assets generate --android
          
          # 3. VERIFY GENERATION
          if [ ! -f "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" ]; then
            echo "ERROR: Icon generation failed!"
            exit 1
          fi

          # 4. DOWNLOAD GRADLE WRAPPER
          GRADLE_VERSION=$(grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
          if [ -z "$GRADLE_VERSION" ]; then GRADLE_VERSION="8.2.1"; fi
          echo "Downloading Gradle Wrapper v$GRADLE_VERSION..."
          mkdir -p android/gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          
          # 5. SYNC AND PERMISSIONS
          chmod +x android/gradlew
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: decision-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
