name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Use --include=optional to help npm find native bindings like @tailwindcss/oxide
          npm install --include=optional
          # Fallback for Tailwind CSS v4 native bindings if the above fails
          npm install @tailwindcss/oxide-linux-x64-gnu || true

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          # COMPLETELY REBUILD FROM SCRATCH
          echo "Removing existing Android project to ensure a clean build..."
          rm -rf android
          
          echo "Adding Android platform..."
          npx cap add android
          
          # Detect Gradle version from properties (after re-adding)
          GRADLE_VERSION=$(grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
          if [ -z "$GRADLE_VERSION" ]; then GRADLE_VERSION="8.2.1"; fi
          echo "Detected Gradle Version: $GRADLE_VERSION"
          
          # CRITICAL: Fix for the missing/corrupted Gradle Wrapper JAR (Common in fresh cap add)
          echo "Downloading official Gradle wrapper jar for v$GRADLE_VERSION..."
          mkdir -p android/gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          
          # Generate icons from assets/icon.png
          if [ -f "assets/icon.png" ]; then
            echo "Preparing assets for generation..."
            # Create required files for Capacitor Assets tool
            cp assets/icon.png assets/icon-only.png
            cp assets/icon.png assets/icon-foreground.png
            cp assets/icon.png assets/icon-background.png
            if [ ! -f "assets/splash.png" ]; then cp assets/icon.png assets/splash.png; fi
            if [ ! -f "assets/splash-dark.png" ]; then cp assets/icon.png assets/splash-dark.png; fi
            
            echo "Generating icons and splash screens..."
            # Run without unsupported flags, it detects assets/ folder automatically
            npx @capacitor/assets generate --android
          fi
          
          # Sync Capacitor
          npx cap sync android
          
          # Ensure permissions
          chmod +x android/gradlew

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: decision-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
