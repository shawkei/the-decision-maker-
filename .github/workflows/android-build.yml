name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Use --include=optional to help npm find native bindings like @tailwindcss/oxide
          npm install --include=optional
          # Fallback for Tailwind CSS v4 native bindings if the above fails
          npm install @tailwindcss/oxide-linux-x64-gnu || true

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          # 1. CLEAN START
          echo "Removing and re-adding Android platform..."
          rm -rf android
          npx cap add android
          
          # 2. GENERATE ASSETS
          echo "Generating icons..."
          npx @capacitor/assets generate --android

          # 3. SYNC PLATFORM
          echo "Syncing Capacitor..."
          npx cap sync android
          
          # 4. NUCLEAR ICON OVERWRITE
          # This script ensures that EVERY SINGLE launcher icon in the android project
          # is exactly your assets/icon.png. It removes adaptive icon XMLs which 
          # are usually the cause of the 'white circle' or 'green robot' issues.
          # We also remove the roundIcon reference from the manifest.
          echo "Executing deep icon overwrite..."
          npx node -e "
          const fs = require('fs');
          const path = require('path');
          
          // 1. Remove roundIcon from Manifest
          const manifestPath = 'android/app/src/main/AndroidManifest.xml';
          if (fs.existsSync(manifestPath)) {
            let manifest = fs.readFileSync(manifestPath, 'utf8');
            manifest = manifest.replace(/android:roundIcon=\"@mipmap\/ic_launcher_round\"/g, '');
            fs.writeFileSync(manifestPath, manifest);
            console.log('Removed roundIcon from Manifest');
          }

          const resDir = 'android/app/src/main/res';
          const sourceIcon = 'assets/icon.png';
          
          if (!fs.existsSync(sourceIcon)) {
            console.error('Source icon missing!');
            process.exit(1);
          }

          function processDir(dir) {
            if (!fs.existsSync(dir)) return;
            fs.readdirSync(dir).forEach(file => {
              const fullPath = path.join(dir, file);
              if (fs.statSync(fullPath).isDirectory()) {
                // Remove adaptive icon folders and version-specific overlaps
                if (file.includes('anydpi') || file.includes('v24') || file.includes('v26')) {
                   console.log('Removing config folder:', fullPath);
                   fs.rmSync(fullPath, { recursive: true, force: true });
                } else {
                  processDir(fullPath);
                }
              } else {
                // Force overwrite ANY file that looks like a launcher icon
                if (file.includes('ic_launcher')) {
                  if (file.endsWith('.xml')) {
                    console.log('Deleting XML config:', fullPath);
                    fs.unlinkSync(fullPath);
                  } else if (file.endsWith('.png')) {
                    console.log('Targeting PNG:', fullPath);
                    fs.copyFileSync(sourceIcon, fullPath);
                  }
                }
              }
            });
          }
          processDir(resDir);
          "

          # 5. DOWNLOAD GRADLE WRAPPER
          GRADLE_VERSION=$(grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
          if [ -z "$GRADLE_VERSION" ]; then GRADLE_VERSION="8.2.1"; fi
          echo "Downloading Gradle Wrapper v$GRADLE_VERSION..."
          mkdir -p android/gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          
          # 6. FINAL PERMISSIONS
          chmod +x android/gradlew

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: decision-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
