name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Use --include=optional to help npm find native bindings like @tailwindcss/oxide
          npm install --include=optional
          # Fallback for Tailwind CSS v4 native bindings if the above fails
          npm install @tailwindcss/oxide-linux-x64-gnu || true

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          # Ensure android directory exists
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Force sync
          npx cap sync android
          
          # CRITICAL: Fix for the missing Gradle Wrapper JAR if it's missing or ignored
          if [ ! -f "android/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Gradle wrapper jar missing. Downloading official wrapper..."
            mkdir -p android/gradle/wrapper
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.1/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar
          fi
          
          # Ensure permissions
          chmod +x android/gradlew

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: decision-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
