name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Use --include=optional to help npm find native bindings like @tailwindcss/oxide
          npm install --include=optional
          # Fallback for Tailwind CSS v4 native bindings if the above fails
          npm install @tailwindcss/oxide-linux-x64-gnu || true

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          # If android directory doesn't exist OR it's missing the Gradle wrapper jar, recreate it
          if [ ! -d "android" ] || [ ! -f "android/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Android project missing or incomplete. Recreating..."
            rm -rf android
            npx cap add android
          else
            echo "Android platform exists and appears valid."
          fi
          # Ensure gradlew has execute permissions
          chmod +x android/gradlew
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: decision-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
