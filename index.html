<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="apple-touch-icon" href="/assets/icon.png">
    <link rel="manifest" href="/public/manifest.json">
    <title>The Decision Maker – Luxury Minimalist</title>
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --primary: #d4af37;
            --secondary: #b8860b;
            --accent-gold: #fcf6ba;
            --dark-grey: #1a1a1a;
            --gold-gradient: linear-gradient(145deg, #fcf6ba, #bf953f, #fbf5b7, #aa771c);
            --white: #F5F5F5;
            --glass-bg: rgba(0, 0, 0, 0.6);
            --glass-border: rgba(212, 175, 55, 0.4);
            --font-main: 'Fredoka', 'Quicksand', -apple-system, sans-serif;
            --shadow-pop: 0 10px 0 rgba(0, 0, 0, 0.5);
            --warm-gradient: var(--gold-gradient);
        }

        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            color: var(--white);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            position: relative;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            background-color: var(--bg-dark);
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 150%);
            background-attachment: fixed;
            position: relative;
        }

        /* Premium Leather Texture Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 1000;
        }

        /* Ambient Background Glow */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmax;
            height: 80vmax;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(184, 134, 11, 0.03) 40%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
            animation: pulseBg 15s infinite alternate ease-in-out;
        }

        @keyframes pulseBg {
            0% { transform: translate(-52%, -48%) scale(1); opacity: 0.6; }
            100% { transform: translate(-48%, -52%) scale(1.2); opacity: 1; }
        }

        /* Casino Marquee Lights Effect */
        .marquee-lights {
            position: absolute;
            width: 90vmin;
            height: 90vmin;
            max-width: 380px;
            max-height: 380px;
            border-radius: 50%;
            border: 8px solid var(--secondary);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: -1;
            background: #050505;
        }

        .light {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            offset-path: circle(44% at center); /* Use percentage for path to stay in sync */
            animation: lightMove 3s linear infinite;
        }

        @media (min-width: 500px) {
            /* Handled by 44% percentage path now */
        }

        @keyframes lightMove {
            from { offset-distance: 0%; }
            to { offset-distance: 100%; }
        }

        .light:nth-child(even) { animation-direction: reverse; animation-duration: 4s; }

        /* Staggered gold lights */
        .light:nth-child(n) { background: var(--accent-gold); box-shadow: 0 0 20px var(--primary); }
        .light:nth-child(odd) { animation-duration: 6s; }

        #app {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 0.5rem; /* Reduced for mobile */
        }

        @media (min-width: 400px) {
            #app {
                padding: 1rem;
            }
        }

        @media (min-width: 600px) {
            #app {
                padding: 2rem;
            }
        }

        /* Screen Transitions */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @media (min-width: 500px) {
            .screen {
                padding: 2rem;
            }
        }

        .screen.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        .screen.inactive {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* Hero Text */
        h1 {
            font-size: clamp(2.2rem, 9vw, 3.8rem);
            font-weight: 900;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
            letter-spacing: -2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(184, 134, 11, 0.4), 2px 2px 0px rgba(0,0,0,0.5);
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Input Section */
        .input-group {
            display: flex;
            gap: 6px;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 30px;
            border: 3px solid var(--secondary);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.1);
            width: 100%;
            max-width: 100%;
            align-items: center;
        }

        input {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            color: var(--white);
            padding: 10px 8px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            font-weight: 600;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .add-btn {
            background: var(--gold-gradient);
            border: 1px solid var(--accent-gold);
            color: #000;
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 14px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-pop), 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .add-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
        }

        /* Chips */
        #options-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-content: flex-start;
            margin-bottom: 2rem;
            padding: 15px;
        }

        .chip {
            background: #111;
            color: var(--accent-gold);
            padding: 12px 24px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.6);
            animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.2s;
            border: 3px solid var(--primary);
        }

        .chip:hover { transform: scale(1.05) rotate(2deg); box-shadow: 8px 8px 0px var(--secondary); }

        .chip:nth-child(n) { border: 3px solid var(--primary); box-shadow: 6px 6px 0px var(--secondary), 0 0 15px rgba(212, 175, 55, 0.2); }

        .chip .remove {
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 800;
            transition: transform 0.2s;
        }
        .chip .remove:hover { transform: scale(1.2); }

        @keyframes bounceIn {
            from { transform: scale(0.3); opacity: 0; }
            40% { transform: scale(1.1); }
            to { transform: scale(1); opacity: 1; }
        }

        /* Done Button */
        .done-btn {
            background: var(--gold-gradient);
            color: #000;
            border: 1px solid var(--accent-gold);
            padding: 22px;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
            box-shadow: 0 10px 0 var(--secondary), 0 0 30px rgba(212, 175, 55, 0.3);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .done-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 0 var(--secondary), 0 0 40px rgba(212, 175, 55, 0.4); }

        .done-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 var(--secondary);
        }

        .done-btn:disabled {
            background: #222;
            box-shadow: 0 10px 0 #111;
            opacity: 0.5;
            cursor: not-allowed;
            color: #555;
            border-color: #333;
        }

        /* Wheel Screen */
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: #000;
            border: 3px solid var(--primary);
            color: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 1.8rem;
            z-index: 10;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .back-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px rgba(0,0,0,0.3); }

        .wheel-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            width: 80vmin;
            height: 80vmin;
            max-width: 340px;
            max-height: 340px;
            filter: drop-shadow(0 0 60px rgba(184, 134, 11, 0.25));
            cursor: pointer;
            z-index: 2;
        }

        #indicator {
            position: absolute;
            top: calc(50% - 48vmin);
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: var(--gold-gradient);
            border: 1px solid var(--accent-gold);
            clip-path: polygon(100% 0, 0 0, 50% 100%);
            z-index: 5;
            filter: drop-shadow(0 6px 0px rgba(0,0,0,0.5));
        }

        @media (min-width: 500px) {
            #indicator {
                top: calc(50% - 195px);
                width: 50px;
                height: 50px;
            }
        }

        /* Result Popup */
        #result-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.4s ease;
            box-shadow: inset 0 0 200px rgba(212, 175, 55, 0.2);
        }

        .glass-card {
            background: #0a0a0a;
            border: 4px solid var(--primary);
            padding: 4rem 3rem;
            border-radius: 40px;
            text-align: center;
            max-width: 85%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(212, 175, 55, 0.1);
            animation: popUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            pointer-events: none;
        }

        #winner-name {
            font-size: clamp(2rem, 10vw, 3.5rem);
            font-weight: 800;
            display: block;
            margin: 1.5rem 0;
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: revealName 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            line-height: 1.2;
        }

        .result-subtitle {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            font-weight: 800;
            display: block;
        }

        .close-popup {
            background: var(--gold-gradient);
            color: #000;
            border: 1px solid var(--accent-gold);
            padding: 18px 50px;
            border-radius: 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            box-shadow: 0 8px 0 var(--secondary);
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .close-popup:hover { transform: scale(1.05); }

        .close-popup:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #cc3355;
        }

        @keyframes popUp {
            from { transform: scale(0.5) translateY(50px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes revealName {
            from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Custom Scrollbar */
        #options-list::-webkit-scrollbar {
            width: 6px;
        }
        #options-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Screen 1: Setup -->
        <div id="screen-setup" class="screen active">
            <h1>The Decision</h1>
            <div class="input-group">
                <input type="text" id="option-input" placeholder="Type an option..." autocomplete="off">
                <button class="add-btn" id="add-option" title="Add Option">+</button>
            </div>
            <div id="options-list"></div>
            <button id="done-btn" class="done-btn" disabled>Done</button>
        </div>

        <!-- Screen 2: Wheel -->
        <div id="screen-wheel" class="screen inactive">
            <button class="back-btn" id="back-btn" title="Back">←</button>
            <div class="wheel-container">
                <div class="marquee-lights">
                    <div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div>
                    <div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div>
                </div>
                <div id="indicator"></div>
                <canvas id="wheel-canvas" width="340" height="340"></canvas>
            </div>
        </div>

        <!-- Result Popup -->
        <div id="result-popup">
            <canvas id="confetti-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
            <div class="glass-card">
                <span class="result-subtitle">THE CHOICE IS</span>
                <span id="winner-name">GOLDEN TICKET</span>
                <button class="close-popup" id="close-popup">Great</button>
            </div>
        </div>
    </div>

    <script>
        // --- Audio Logic (Web Audio API) ---
        const AudioFX = (() => {
            let audioCtx = null;
            const init = () => {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            };
            const playTick = () => {
                init();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            };
            const playClick = () => {
                init();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            };
            const playWin = () => {
                init();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + i * 0.1);
                    gain.gain.setValueAtTime(0, now + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.15, now + i * 0.1 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + i * 0.1);
                    osc.stop(now + i * 0.1 + 0.5);
                });
            };
            return { playTick, playWin, playClick, init };
        })();

        const state = {
            options: [],
            isSpinning: false,
            angle: 0,
            spinSpeed: 0,
            winner: null,
            lastTickAngle: 0
        };

        const elements = {
            setupScreen: document.getElementById('screen-setup'),
            wheelScreen: document.getElementById('screen-wheel'),
            input: document.getElementById('option-input'),
            addBtn: document.getElementById('add-option'),
            optionsList: document.getElementById('options-list'),
            doneBtn: document.getElementById('done-btn'),
            backBtn: document.getElementById('back-btn'),
            canvas: document.getElementById('wheel-canvas'),
            popup: document.getElementById('result-popup'),
            winnerName: document.getElementById('winner-name'),
            closePopup: document.getElementById('close-popup'),
            confettiCanvas: document.getElementById('confetti-canvas')
        };

        const ctx = elements.canvas.getContext('2d');
        const cCtx = elements.confettiCanvas.getContext('2d');
        let centerX = elements.canvas.width / 2;
        let centerY = elements.canvas.height / 2;
        let radius = elements.canvas.width / 2 - 10;

        // Time of Day Theme with Warm Gradients
        function applyTimeTheme() {
            const hour = new Date().getHours();
            const root = document.documentElement;
            if (hour >= 5 && hour < 11) { // Morning: Intense Amber center
                root.style.setProperty('--bg-gradient', 'radial-gradient(circle at center, #d35400 0%, #2b1406 250%)');
                root.style.setProperty('--bg-dark', '#2b1406');
                root.style.setProperty('--white', '#ffffff');
            } else if (hour >= 11 && hour < 17) { // Day: Golden Orange center
                root.style.setProperty('--bg-gradient', 'radial-gradient(circle at center, #f39c12 0%, #331a0a 250%)');
                root.style.setProperty('--bg-dark', '#331a0a');
                root.style.setProperty('--white', '#ffffff');
            } else if (hour >= 17 && hour < 21) { // Evening: Sunset Orange center
                root.style.setProperty('--bg-gradient', 'radial-gradient(circle at center, #e67e22 0%, #1f0d06 250%)');
                root.style.setProperty('--bg-dark', '#1f0d06');
                root.style.setProperty('--white', '#ffffff');
            } else { // Night: Rust Orange center to black edges
                root.style.setProperty('--bg-gradient', 'radial-gradient(circle at center, #873600 0%, #000000 250%)');
                root.style.setProperty('--bg-dark', '#0d0500');
                root.style.setProperty('--white', '#ffffff');
            }
        }

        // --- Celebrative Logic (Confetti) ---
        let confetti = [];
        function createConfetti() {
            confetti = [];
            const count = window.innerWidth < 500 ? 80 : 150;
            for (let i = 0; i < count; i++) {
                confetti.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight - window.innerHeight,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * 10 + 10,
                    color: i % 2 === 0 ? '#d4af37' : '#fcf6ba', // Gold confetti
                    tilt: Math.random() * 10 - 10,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.05,
                    tiltAngle: 0
                });
            }
        }

        function drawConfetti() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            cCtx.clearRect(0, 0, w, h);
            confetti.forEach((p, i) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.d);
                p.tilt = Math.sin(p.tiltAngle) * 15;

                cCtx.beginPath();
                cCtx.lineWidth = p.r;
                cCtx.strokeStyle = p.color;
                cCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                cCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                cCtx.stroke();
            });

            if (elements.popup.style.display === 'flex') {
                requestAnimationFrame(drawConfetti);
            }
        }

        window.onresize = () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            elements.confettiCanvas.width = w;
            elements.confettiCanvas.height = h;
        };
        window.onresize();
        // Theme is now static luxury gold/black
        
        // Ensure audio is ready on first touch/click
        document.addEventListener('touchstart', () => AudioFX.init(), { once: true });
        document.addEventListener('mousedown', () => AudioFX.init(), { once: true });


        // --- Setup Logic ---

        function updateUI() {
            elements.optionsList.innerHTML = '';
            state.options.forEach((opt, index) => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerHTML = `<span>${opt}</span><span class="remove" data-index="${index}">×</span>`;
                elements.optionsList.appendChild(chip);
            });
            elements.doneBtn.disabled = state.options.length < 2;
        }

        elements.addBtn.onclick = () => {
            AudioFX.init();
            const val = elements.input.value.trim();
            if (val && state.options.length < 12) {
                AudioFX.playClick();
                state.options.push(val);
                elements.input.value = '';
                updateUI();
            }
        };

        elements.input.onkeypress = (e) => {
            if (e.key === 'Enter') elements.addBtn.click();
        };

        elements.optionsList.onclick = (e) => {
            if (e.target.classList.contains('remove')) {
                AudioFX.init();
                const index = parseInt(e.target.dataset.index);
                state.options.splice(index, 1);
                updateUI();
            }
        };

        elements.doneBtn.onclick = () => {
            AudioFX.playClick();
            elements.setupScreen.classList.remove('active');
            elements.setupScreen.classList.add('inactive');
            elements.wheelScreen.classList.remove('inactive');
            elements.wheelScreen.classList.add('active');
            drawWheel();
        };

        elements.backBtn.onclick = () => {
            if (state.isSpinning) return;
            AudioFX.playClick();
            elements.wheelScreen.classList.remove('active');
            elements.wheelScreen.classList.add('inactive');
            elements.setupScreen.classList.remove('inactive');
            elements.setupScreen.classList.add('active');
            resetWheel();
        };

        // --- Wheel Logic ---

        const segmentColors = ['#111111', '#1a1a1a', '#0a0a0a', '#222222'];

        function drawWheel() {
            const n = state.options.length;
            const arc = (Math.PI * 2) / n;

            ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);

            // 1. Deep Outer Shadow
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 10, 0, Math.PI * 2);
            ctx.shadowBlur = 40;
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fill();
            ctx.restore();

            state.options.forEach((opt, i) => {
                const startAngle = state.angle + i * arc;
                const endAngle = startAngle + arc;

                // 2. Segment
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                
                const baseColor = segmentColors[i % segmentColors.length];
                ctx.fillStyle = baseColor;
                ctx.fill();
                
                // Gold divider lines
                ctx.strokeStyle = "rgba(212, 175, 55, 0.4)";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();

                // 3. Text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + arc / 2);
                ctx.textAlign = "right";
                
                const fontSize = window.innerWidth < 360 ? 12 : 14;
                ctx.font = `900 ${fontSize}px Fredoka`;
                const displayText = opt.length > 12 ? opt.substring(0, 10) + '..' : opt;
                
                ctx.fillStyle = "#d4af37"; // Gold text
                ctx.fillText(displayText, radius - 40, 6);
                ctx.restore();
            });

            // 4. Central Hub (Gold)
            ctx.save();
            // Outer shadow
            ctx.beginPath();
            ctx.arc(centerX, centerY, 52, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.fill();

            // Metallic Gold Hub
            const hubGrad = ctx.createLinearGradient(centerX - 45, centerY - 45, centerX + 45, centerY + 45);
            hubGrad.addColorStop(0, '#f9e29c');
            hubGrad.addColorStop(0.5, '#d4af37');
            hubGrad.addColorStop(1, '#b8860b');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 45, 0, Math.PI * 2);
            ctx.fillStyle = hubGrad;
            ctx.fill();
            
            // Bevel effect on hub
            ctx.beginPath();
            ctx.arc(centerX, centerY, 42, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 2;
            ctx.stroke();

            // SPIN text with depth
            ctx.font = "900 22px Fredoka";
            ctx.textAlign = "center";
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillText("SPIN", centerX, centerY + 9);
            ctx.fillStyle = "#111"; // Black on Gold
            ctx.fillText("SPIN", centerX, centerY + 7);
            ctx.restore();

            // 5. Realistic Gold Outer Rim
            ctx.save();
            const rimGrad = ctx.createLinearGradient(centerX - radius - 15, centerY - radius - 15, centerX + radius + 15, centerY + radius + 15);
            rimGrad.addColorStop(0, '#bf953f');   
            rimGrad.addColorStop(0.25, '#fcf6ba'); 
            rimGrad.addColorStop(0.5, '#b38728');  
            rimGrad.addColorStop(0.75, '#fbf5b7'); 
            rimGrad.addColorStop(1, '#aa771c');    
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 7, 0, Math.PI * 2);
            ctx.lineWidth = 15;
            ctx.strokeStyle = rimGrad;
            ctx.stroke();
            
            // Rim gloss
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 14, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }

        elements.canvas.onclick = () => {
            if (state.isSpinning) return;
            AudioFX.init(); // Unlock AudioContext on mobile
            state.isSpinning = true;
            state.spinSpeed = Math.random() * 0.4 + 0.3; // High initial speed
            animateSpin();
        };

        function animateSpin() {
            if (state.spinSpeed > 0.001) {
                state.angle += state.spinSpeed;
                state.spinSpeed *= 0.985; // Natural friction
                
                // Tick sound logic
                const n = state.options.length;
                const arc = (Math.PI * 2) / n;
                const currentSegment = Math.floor(state.angle / arc);
                const lastSegment = Math.floor(state.lastTickAngle / arc);
                
                if (currentSegment !== lastSegment) {
                    AudioFX.playTick();
                }
                state.lastTickAngle = state.angle;
                
                drawWheel();
                requestAnimationFrame(animateSpin);
            } else {
                state.isSpinning = false;
                state.spinSpeed = 0;
                determineWinner();
            }
        }

        function determineWinner() {
            const n = state.options.length;
            const arc = (Math.PI * 2) / n;
            // Indicators at top is -PI/2
            // The angle we track is clockwise offset for the 0-th segment.
            // Normalize angle
            let normalizedAngle = (state.angle % (Math.PI * 2));
            if (normalizedAngle < 0) normalizedAngle += (Math.PI * 2);
            
            // Pointing at top (-PI/2)
            // (Math.PI * 1.5 - normalizedAngle) gives the relative angle to the top pointer
            let targetAngle = (Math.PI * 1.5 - normalizedAngle) % (Math.PI * 2);
            if (targetAngle < 0) targetAngle += (Math.PI * 2);
            
            const winningIndex = Math.floor(targetAngle / arc) % n;
            state.winner = state.options[winningIndex];
            showResult();
        }

        function showResult() {
            AudioFX.playWin();
            elements.winnerName.textContent = state.winner;
            elements.popup.style.display = 'flex';
            createConfetti();
            drawConfetti();
            setTimeout(() => {
                elements.popup.style.opacity = '1';
            }, 10);
        }

        elements.closePopup.onclick = () => {
            AudioFX.playClick();
            elements.popup.style.opacity = '0';
            setTimeout(() => {
                elements.popup.style.display = 'none';
            }, 400);
        };

        function resetWheel() {
            state.angle = 0;
            state.spinSpeed = 0;
            state.isSpinning = false;
        }

        // Initial UI
        updateUI();

    </script>
</body>
</html>
